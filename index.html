<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lamia's Daily Journal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Lamia's Daily Journal</h1>
    <p>A public log of my daily thoughts, learnings, and life.</p>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="#" id="toggle-form-btn">+ New Entry</a>
    </nav>
  </header>

  <div class="new-entry-form" id="new-entry-form" style="display:none;">
    <h2>New Entry</h2>
    <input type="text" id="form-title" placeholder="Title" />
    <input type="text" id="form-tags" placeholder="Tags (comma separated, e.g. css, git)" />
    <textarea id="form-body" placeholder="Write your entry here..."></textarea>
    <button id="publish-btn">Publish</button>
  </div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Search entries..." />
  </div>

  <div class="tag-filter" id="tag-filter"></div>

  <p class="entry-count" id="entry-count"></p>

  <main id="entries-container"></main>

  <footer>
    <p>Written and built by Lamia Khan</p>
  </footer>

  <script src="entries.js"></script>
  <script src="app.js"></script>

</body>
</html>
